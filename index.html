<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talento Jovem</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #2563EB;
    --blue-light: #3B82F6;
    --blue-soft: #DBEAFE;
    --green: #22C55E;
    --yellow: #FACC15;
    --pink: #F472B6;
    --orange: #FB923C;
    --purple: #A78BFA;
    --teal: #2DD4BF;
    --white: #FFFFFF;
    --gray-50: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-600: #475569;
    --gray-800: #1E293B;
    --shadow: 0 4px 24px rgba(37,99,235,0.10);
    --shadow-lg: 0 8px 40px rgba(37,99,235,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--white);
    color: var(--gray-800);
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--gray-100); }
  ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 10px; }

  /* ===== SIDEBAR NAV ===== */
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: 230px; height: 100vh;
    background: var(--white);
    border-right: 1.5px solid var(--gray-200);
    display: flex; flex-direction: column;
    padding: 24px 0;
    z-index: 100;
    box-shadow: 4px 0 20px rgba(37,99,235,0.06);
  }

  .logo-area {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px 28px 20px;
    border-bottom: 1.5px solid var(--gray-200);
  }

  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--blue);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--green); }

  nav { flex: 1; padding: 16px 0; overflow-y: auto; }

  nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 22px;
    color: var(--gray-600);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 0 12px 12px 0;
    margin-right: 16px;
    transition: all .2s;
    cursor: pointer;
  }

  nav a:hover, nav a.active {
    background: var(--blue-soft);
    color: var(--blue);
    font-weight: 700;
  }

  .sidebar-footer {
    padding: 16px 20px 0;
    border-top: 1.5px solid var(--gray-200);
  }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--gray-50);
    border-radius: 12px;
    padding: 10px 12px;
  }

  .user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 15px;
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    margin-left: 230px;
    min-height: 100vh;
    background: var(--gray-50);
  }

  .topbar {
    background: white;
    border-bottom: 1.5px solid var(--gray-200);
    padding: 14px 32px;
    display: flex; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--blue);
  }

  .page { padding: 28px 32px; }

  .card {
    background: white;
    border-radius: 16px;
    border: 1.5px solid var(--gray-200);
    box-shadow: var(--shadow);
    padding: 24px;
  }

  @media (max-width: 900px) {
    .sidebar { width: 64px; }
    .logo-text, .user-info { display: none; }
    nav a span:not(.nav-icon) { display: none; }
    .main { margin-left: 64px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-area">
    <svg width="40" height="46" viewBox="0 0 40 46" fill="none">
      <rect x="18" y="28" width="4" height="14" rx="2" fill="#2563EB" opacity="0.7"/>
      <path d="M20 28 Q10 22 8 14" stroke="#2563EB" stroke-width="1.8" fill="none"/>
      <path d="M20 28 Q30 22 32 14" stroke="#2563EB" stroke-width="1.8" fill="none"/>
      <circle cx="8" cy="13" r="4.5" fill="#22C55E" opacity="0.85"/>
      <circle cx="32" cy="13" r="4.5" fill="#F472B6" opacity="0.85"/>
      <circle cx="20" cy="5" r="4" fill="#A78BFA" opacity="0.9"/>
    </svg>
    <div class="logo-text">Talento<br><span>Jovem</span></div>
  </div>

  <nav>
    <a class="active" onclick="navigate('dashboard')">
      <span class="nav-icon">🏠</span>
      <span>Início</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">TJ</div>
      <div class="user-info">
        <p style="font-size: 13px; font-weight: 700;">Usuário</p>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <h1>Dashboard</h1>
  </header>

  <div class="page">
    <div class="card">
      <h2>Olá! Seu site está funcionando.</h2>
      <p style="margin-top: 15px; color: var(--gray-600);">O código foi corrigido e todas as abas foram fechadas corretamente.</p>
    </div>
  </div>
</main>

<script>
  function navigate(page) {
    console.log("Navegando para: " + page);
  }
</script>

</body>
</html>
